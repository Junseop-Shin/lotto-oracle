<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOTTO ORACLE</title>
  <meta property="og:title" content="Lotto Oracle" />
  <meta property="og:description" content="로또 역대 당첨번호 분석 기반 번호 추천 시스템. FastAPI + Docker." />
  <meta property="og:image" content="https://lotto.nuclearbomb6518.com/static/og-image.svg" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lotto.nuclearbomb6518.com/static/og-image.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080c10;
      --surface:    #0e1520;
      --surface2:   #131d2b;
      --border:     #1e2d40;
      --accent:     #00ff88;
      --accent-dim: #00cc6a;
      --accent-bg:  rgba(0,255,136,.08);
      --text:       #e2e8f0;
      --text-dim:   #64748b;
      --text-muted: #334155;
      --success:    #22c55e;
      --warning:    #f59e0b;
      --danger:     #ef4444;
      --blue:       #3b82f6;

      /* Ball colors */
      --ball-y:  #fbc400;
      --ball-b:  #69c8f2;
      --ball-r:  #ff6b6b;
      --ball-g:  #aaaaaa;
      --ball-gr: #b0d840;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Typography ─────────────────────────────────────────────────────── */
    .mono { font-family: 'Space Mono', monospace; }
    h1, h2, h3 { font-family: 'Space Mono', monospace; letter-spacing: 0.05em; }

    /* ─── Layout Shell ───────────────────────────────────────────────────── */
    .shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    header {
      padding: 36px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #fbc400, #ff6b6b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(251,196,0,.35);
      flex-shrink: 0;
    }

    h1.title {
      font-size: clamp(22px, 4vw, 34px);
      background: linear-gradient(90deg, #fbc400 0%, #69c8f2 50%, #b0d840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.15em;
    }

    .status-bar {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot-ok   { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot-warn { background: var(--warning); box-shadow: 0 0 6px var(--warning); }

    /* ─── Section Wrapper ────────────────────────────────────────────────── */
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 18px;
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Stats Cards ────────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'Space Mono', monospace;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      transition: all 0.18s ease;
      user-select: none;
    }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }
    .btn-primary:hover {
      background: var(--accent-dim);
      box-shadow: 0 0 18px rgba(0,255,136,.45);
    }
    .btn-primary:disabled {
      background: var(--text-muted);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-lg { padding: 13px 32px; font-size: 13px; }

    /* ─── Algorithm Chips ────────────────────────────────────────────────── */
    .algo-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .chip {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      min-width: 130px;
      user-select: none;
    }

    .chip:hover:not(.disabled) {
      border-color: rgba(0,255,136,.4);
      background: rgba(0,255,136,.04);
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      box-shadow: 0 0 14px rgba(0,255,136,.2), inset 0 0 8px rgba(0,255,136,.05);
    }

    .chip.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .chip-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .chip.active .chip-label { color: var(--accent); }

    .chip-desc {
      font-size: 11px;
      color: var(--text-dim);
    }

    .select-hint {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    .select-hint.error { color: var(--danger); }

    /* ─── Generate Controls ──────────────────────────────────────────────── */
    .gen-controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    /* ─── Result Rows ────────────────────────────────────────────────────── */
    .results-area {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      transition: border-color 0.2s;
    }
    .result-row:hover { border-color: #2a3d52; }

    .result-row-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .method-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 99px;
      text-transform: uppercase;
      color: #000;
    }

    /* per-algo badge colors */
    .badge-apriori     { background: #fbc400; }
    .badge-conditional { background: #69c8f2; }
    .badge-markov      { background: #b0d840; }
    .badge-ensemble    { background: #ff6b6b; }
    .badge-default     { background: #aaaaaa; }

    .score-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }
    .score-text span {
      color: var(--accent);
      font-weight: 700;
    }

    .ball-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ─── Lotto Ball ─────────────────────────────────────────────────────── */
    .ball-wrap {
      position: relative;
      width: 50px; height: 50px;
      flex-shrink: 0;
    }

    .ball {
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      color: rgba(0,0,0,.75);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -4px 8px rgba(0,0,0,.3), inset 0 3px 6px rgba(255,255,255,.35);
      user-select: none;
      transition: transform 0.1s;
    }

    .ball-slot {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      color: rgba(0,0,0,.8);
      line-height: 50px;
    }

    /* Ball color variants */
    .ball-y  { background: radial-gradient(circle at 35% 35%, #ffe066, #fbc400, #c49200); }
    .ball-b  { background: radial-gradient(circle at 35% 35%, #a8e6ff, #69c8f2, #2b8cb8); }
    .ball-r  { background: radial-gradient(circle at 35% 35%, #ffaaaa, #ff6b6b, #c73333); }
    .ball-g  { background: radial-gradient(circle at 35% 35%, #d4d4d4, #aaaaaa, #6b6b6b); }
    .ball-gr { background: radial-gradient(circle at 35% 35%, #d8f078, #b0d840, #7da020); }

    @keyframes ballStop {
      0%   { transform: scale(1.15); }
      40%  { transform: scale(0.93); }
      65%  { transform: scale(1.05); }
      85%  { transform: scale(0.98); }
      100% { transform: scale(1); }
    }
    .ball.stopped { animation: ballStop 0.35s ease forwards; }

    @keyframes spinGlow {
      0%, 100% { box-shadow: inset 0 -4px 8px rgba(0,0,0,.3), inset 0 3px 6px rgba(255,255,255,.35), 0 0 10px rgba(255,255,255,.15); }
      50%       { box-shadow: inset 0 -4px 8px rgba(0,0,0,.3), inset 0 3px 6px rgba(255,255,255,.35), 0 0 18px rgba(255,255,255,.35); }
    }
    .ball.spinning { animation: spinGlow 0.2s ease-in-out infinite; }

    /* ─── Empty State ────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 13px; }

    /* ─── Loading Overlay ────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,12,16,.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #loading-overlay.visible { display: flex; }

    .loader-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ─── Toast ──────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13px;
      min-width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      animation: toastIn 0.25s ease;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--blue); }

    /* ─── Responsiveness ─────────────────────────────────────────────────── */
    @media (max-width: 500px) {
      .ball-wrap { width: 40px; height: 40px; }
      .ball { width: 40px; height: 40px; font-size: 13px; }
      .ball-slot { font-size: 13px; line-height: 40px; }
      .ball-row { gap: 6px; }
      .chip { min-width: 110px; }
    }

    /* ─── Scanline effect ────────────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── Pulse animation for status dots ───────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .dot-ok { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loader-text" id="loading-text">COMPUTING...</div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<div class="shell">

  <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
  <header>
    <div class="header-top">
      <div class="logo-icon">🔮</div>
      <h1 class="title">LOTTO ORACLE</h1>
    </div>
    <div class="status-bar">
      <span>
        <span class="status-dot dot-ok"></span>
        총 <strong id="hdr-total" class="mono">—</strong>회차 수집
      </span>
      <span>
        캐시: <span id="hdr-cache" class="mono">확인 중...</span>
      </span>
      <span class="mono" id="hdr-latest">최신 회차: —</span>
    </div>
  </header>

  <!-- ══ SECTION 1: DATA STATUS ═══════════════════════════════════════════ -->
  <section>
    <div class="section-title">DATA STATUS</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">총 회차 수</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">수집된 회차</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">DB 최신 회차</div>
        <div class="stat-value" id="stat-latest">—</div>
        <div class="stat-sub">회차 번호</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">마지막 업데이트</div>
        <div class="stat-value" style="font-size:14px;padding-top:4px;" id="stat-updated">—</div>
        <div class="stat-sub">갱신 시각</div>
      </div>
    </div>
    <button class="btn btn-secondary" id="btn-update">
      ↻ 수동 업데이트
    </button>
  </section>

  <!-- ══ SECTION 2: NUMBER GENERATION ════════════════════════════════════ -->
  <section>
    <div class="section-title">NUMBER GENERATION</div>

    <!-- Algorithm Chip Selector -->
    <div class="algo-chips" id="algo-chips">
      <!-- chips injected by JS -->
    </div>
    <p class="select-hint" id="select-hint">최대 3개 선택 (현재 0개 선택됨)</p>

    <!-- Generate Button -->
    <div class="gen-controls">
      <button class="btn btn-primary btn-lg" id="btn-generate">
        ⚡ 번호 생성
      </button>
    </div>

    <!-- Results -->
    <div class="results-area" id="results-area">
      <div class="empty-state">
        <div class="icon">🎱</div>
        <p>알고리즘을 선택한 뒤 버튼을 누르세요.</p>
      </div>
    </div>
  </section>

</div><!-- /shell -->

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */

const BALL_CLASS = n => {
  if (n <= 10) return 'ball-y';
  if (n <= 20) return 'ball-b';
  if (n <= 30) return 'ball-r';
  if (n <= 40) return 'ball-g';
  return 'ball-gr';
};

const BADGE_CLASS = id => {
  const map = {
    apriori:     'badge-apriori',
    conditional: 'badge-conditional',
    markov:      'badge-markov',
    ensemble:    'badge-ensemble',
  };
  return map[id] ?? 'badge-default';
};

function toast(msg, type = 'info', duration = 3200) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function showLoading(text = 'COMPUTING...') {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-overlay').classList.add('visible');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('visible');
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`API ${path} → ${res.status}`);
  return res.json();
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════════════ */

// List of available algorithms (populated from /api/algorithms or mock)
let availableAlgorithms = [];
// Set of currently selected algorithm IDs
let selectedAlgorithms = new Set();
const MAX_SELECTION = 3;

/* ═══════════════════════════════════════════════════════════════════════════
   SLOT MACHINE ANIMATION
   ═══════════════════════════════════════════════════════════════════════════ */

function spinBall(ballEl, slotEl, finalNum, delay) {
  ballEl.className = 'ball spinning';
  slotEl.textContent = '?';

  let frame = 0;
  const interval = setInterval(() => {
    const rnd = Math.floor(Math.random() * 45) + 1;
    slotEl.textContent = rnd;
    ballEl.className = `ball spinning ${BALL_CLASS(rnd)}`;
    frame++;
  }, 55);

  setTimeout(() => {
    clearInterval(interval);
    slotEl.textContent = finalNum;
    ballEl.className = `ball stopped ${BALL_CLASS(finalNum)}`;
  }, delay);
}

function animateRow(ballEls, slotEls, numbers) {
  const BASE_SPIN = 1200;
  const STAGGER   = 280;

  return new Promise(resolve => {
    numbers.forEach((num, i) => {
      const stopDelay = BASE_SPIN + i * STAGGER;
      spinBall(ballEls[i], slotEls[i], num, stopDelay);
    });
    const totalDuration = BASE_SPIN + (numbers.length - 1) * STAGGER + 400;
    setTimeout(resolve, totalDuration);
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   BALL DOM BUILDER
   ═══════════════════════════════════════════════════════════════════════════ */

function createBall(num) {
  const wrap = document.createElement('div');
  wrap.className = 'ball-wrap';

  const ball = document.createElement('div');
  const cls  = num ? BALL_CLASS(num) : 'ball-g';
  ball.className = `ball ${cls}`;

  const slot = document.createElement('span');
  slot.className = 'ball-slot';
  slot.textContent = num ?? '?';

  ball.appendChild(slot);
  wrap.appendChild(ball);
  return { wrap, ball, slot };
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESULT ROW RENDERER
   ═══════════════════════════════════════════════════════════════════════════ */

function buildResultRow(algo) {
  const row = document.createElement('div');
  row.className = 'result-row';

  // Header: badge + score
  const header = document.createElement('div');
  header.className = 'result-row-header';

  const badge = document.createElement('span');
  badge.className = `method-badge ${BADGE_CLASS(algo.id)}`;
  badge.textContent = algo.label ?? algo.id;

  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.innerHTML = 'score: <span>—</span>';

  header.appendChild(badge);
  header.appendChild(scoreText);

  // Ball row
  const ballRow = document.createElement('div');
  ballRow.className = 'ball-row';

  const ballEls = [], slotEls = [];
  for (let i = 0; i < 6; i++) {
    const { wrap, ball, slot } = createBall(null);
    ballRow.appendChild(wrap);
    ballEls.push(ball);
    slotEls.push(slot);
  }

  row.appendChild(header);
  row.appendChild(ballRow);

  const scoreSpan = scoreText.querySelector('span');
  return { row, ballEls, slotEls, scoreSpan };
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOCK DATA (fallback when API unavailable)
   ═══════════════════════════════════════════════════════════════════════════ */

const MOCK_ALGORITHMS = [
  { id: 'apriori',     label: 'Apriori',     description: '공동출현 빈도 기반' },
  { id: 'conditional', label: '조건부확률',  description: '조건부 확률 체인' },
  { id: 'markov',      label: '마르코프',    description: '마르코프 전이 행렬' },
];

function mockGenerateSets(methods, countPerMethod) {
  const sets = [];
  methods.forEach(method => {
    for (let s = 0; s < countPerMethod; s++) {
      const nums = new Set();
      while (nums.size < 6) nums.add(Math.floor(Math.random() * 45) + 1);
      sets.push({
        numbers: [...nums].sort((a, b) => a - b),
        method,
        score: (Math.random() * 0.4 + 0.6).toFixed(3),
      });
    }
  });
  return sets;
}

function mockStats() {
  return {
    total:     1127,
    latest:    1127,
    updatedAt: new Date().toISOString(),
  };
}

/* ═══════════════════════════════════════════════════════════════════════════
   API CALLS (with mock fallback)
   ═══════════════════════════════════════════════════════════════════════════ */

async function fetchAlgorithms() {
  try {
    const data = await apiFetch('/api/algorithms');
    return data.algorithms ?? data;
  } catch {
    return MOCK_ALGORITHMS;
  }
}

async function fetchStats() {
  try {
    return await apiFetch('/api/stats');
  } catch {
    return mockStats();
  }
}

async function fetchGenerate(methods) {
  try {
    return await apiFetch('/api/generate', {
      method: 'POST',
      body: JSON.stringify({ methods, count_per_method: 1 }),
    });
  } catch {
    return { sets: mockGenerateSets(methods, 1) };
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATS RENDER
   ═══════════════════════════════════════════════════════════════════════════ */

function renderStats(data) {
  const total   = data.total   ?? data.totalDraws ?? '—';
  const latest  = data.latest  ?? data.latestDraw ?? '—';
  const updated = data.updatedAt ? new Date(data.updatedAt).toLocaleString('ko-KR') : '—';

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-latest').textContent  = latest;
  document.getElementById('stat-updated').textContent = updated;
  document.getElementById('hdr-total').textContent    = total;
  document.getElementById('hdr-latest').textContent   = `최신 회차: ${latest}`;

  const cacheAge = data.cacheAge ?? 0;
  const cacheEl  = document.getElementById('hdr-cache');
  if (cacheAge < 60) {
    cacheEl.innerHTML = '<span class="status-dot dot-ok"></span> 최신';
  } else {
    cacheEl.innerHTML = '<span class="status-dot dot-warn"></span> 오래됨';
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   CHIP UI
   ═══════════════════════════════════════════════════════════════════════════ */

function updateHint() {
  const hint = document.getElementById('select-hint');
  const count = selectedAlgorithms.size;
  if (count === 0) {
    hint.textContent = `최대 ${MAX_SELECTION}개 선택 (현재 0개 선택됨)`;
    hint.className = 'select-hint';
  } else {
    hint.textContent = `최대 ${MAX_SELECTION}개 선택 (현재 ${count}개 선택됨)`;
    hint.className = 'select-hint';
  }
}

function updateChipStates() {
  const chips = document.querySelectorAll('#algo-chips .chip');
  const atMax = selectedAlgorithms.size >= MAX_SELECTION;
  chips.forEach(chip => {
    const id = chip.dataset.id;
    const isActive = selectedAlgorithms.has(id);
    chip.classList.toggle('active', isActive);
    chip.classList.toggle('disabled', atMax && !isActive);
  });
  updateHint();
}

function renderChips(algorithms) {
  const container = document.getElementById('algo-chips');
  container.innerHTML = '';

  algorithms.forEach(algo => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.id = algo.id;

    const label = document.createElement('span');
    label.className = 'chip-label';
    label.textContent = algo.label ?? algo.id;

    const desc = document.createElement('span');
    desc.className = 'chip-desc';
    desc.textContent = algo.description ?? '';

    chip.appendChild(label);
    chip.appendChild(desc);

    chip.addEventListener('click', () => {
      const id = chip.dataset.id;
      if (selectedAlgorithms.has(id)) {
        selectedAlgorithms.delete(id);
        updateChipStates();
      } else {
        if (selectedAlgorithms.size >= MAX_SELECTION) {
          // Flash error hint
          const hint = document.getElementById('select-hint');
          hint.textContent = `최대 ${MAX_SELECTION}개까지만 선택할 수 있습니다.`;
          hint.className = 'select-hint error';
          setTimeout(() => {
            hint.className = 'select-hint';
            updateHint();
          }, 2000);
          return;
        }
        selectedAlgorithms.add(id);
        updateChipStates();
      }
    });

    container.appendChild(chip);
  });

  updateChipStates();
}

/* ═══════════════════════════════════════════════════════════════════════════
   GENERATE NUMBERS
   ═══════════════════════════════════════════════════════════════════════════ */

async function generateNumbers() {
  if (selectedAlgorithms.size === 0) {
    toast('알고리즘을 하나 이상 선택하세요.', 'error');
    return;
  }

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  showLoading('ORACLE COMPUTING...');

  const methods = [...selectedAlgorithms];
  // Map method IDs to algo objects for badge rendering
  const algoById = {};
  availableAlgorithms.forEach(a => { algoById[a.id] = a; });

  try {
    const res = await fetchGenerate(methods);
    const sets = res.sets ?? res;

    const area = document.getElementById('results-area');
    area.innerHTML = '';

    const rowData = [];
    sets.forEach(set => {
      const algoId = set.method ?? methods[0];
      const algo = algoById[algoId] ?? { id: algoId, label: algoId };
      const { row, ballEls, slotEls, scoreSpan } = buildResultRow(algo);
      area.appendChild(row);
      rowData.push({ ballEls, slotEls, numbers: set.numbers, score: set.score, scoreSpan });
    });

    hideLoading();

    // Animate rows with slight stagger between row starts
    for (let i = 0; i < rowData.length; i++) {
      const { ballEls, slotEls, numbers, score, scoreSpan } = rowData[i];
      await new Promise(r => setTimeout(r, i === 0 ? 0 : 200));
      animateRow(ballEls, slotEls, numbers).then(() => {
        scoreSpan.textContent = score ?? '—';
      });
    }

    const lastRowDuration = 1200 + 5 * 280 + 400;
    await new Promise(r => setTimeout(r, lastRowDuration + rowData.length * 200));

    toast('번호 생성 완료!', 'success');
  } catch (err) {
    hideLoading();
    toast(`오류: ${err.message}`, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════════════════════════════════ */

document.getElementById('btn-generate').addEventListener('click', generateNumbers);

document.getElementById('btn-update').addEventListener('click', async () => {
  const btn = document.getElementById('btn-update');
  btn.disabled = true;
  btn.textContent = '업데이트 중...';
  try {
    await fetch('/api/fetch?mode=all', { method: 'POST' }).catch(() => {});
    const stats = await fetchStats();
    renderStats(stats);
    toast('데이터 업데이트 완료!', 'success');
  } catch (err) {
    toast('업데이트 실패', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ 수동 업데이트';
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════════ */

async function init() {
  // Load algorithms and render chips
  availableAlgorithms = await fetchAlgorithms();
  renderChips(availableAlgorithms);

  // Load stats
  try {
    const stats = await fetchStats();
    renderStats(stats);
  } catch (e) {
    console.warn('Stats load failed', e);
  }
}

init();
